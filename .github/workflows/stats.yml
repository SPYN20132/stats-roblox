name: Statistiques RIVALS + WhatsApp
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get Stats + Send WhatsApp
        shell: bash
        run: |
          UNIVERSE_ID="5199624968"
          PLAYING=0
          VISITS=0
          FAVS=0

          echo "Test 1: rprxy.xyz"
          STATS=$(curl -s -L --max-time 10 "https://rprxy.xyz/v1/games?universeIds=$UNIVERSE_ID" || echo "")
          if echo "$STATS" | jq -e '.data[0]' > /dev/null 2>&1; then
            echo "rprxy OK"
          else
            echo "Test 2: roproxy.com"
            STATS=$(curl -s -L --max-time 10 "https://games.roproxy.com/v1/games?universeIds=$UNIVERSE_ID" || echo "")
            if echo "$STATS" | jq -e '.data[0]' > /dev/null 2>&1; then
              echo "roproxy OK"
            else
              echo "Test 3: games.roblox.com"
              STATS=$(curl -s -L --max-time 10 "https://games.roblox.com/v1/games?universeIds=$UNIVERSE_ID" || echo "")
            fi
          fi

          echo "Réponse finale: $STATS"

          PLAYING=$(echo $STATS | jq -r '.data[0].playing // 0')
          VISITS=$(echo $STATS | jq -r '.data[0].visits // 0')
          FAVS=$(echo $STATS | jq -r '.data[0].favoritedCount // 0')

          PLAYING_F=$(printf "%'d" $PLAYING)
          VISITS_F=$(printf "%'d" $VISITS)
          FAVS_F=$(printf "%'d" $FAVS)

          if [ "$PLAYING" = "0" ]; then
            MSG="❌ *RIVALS - API HS*\n\nAucun proxy ne répond.\n\n_$(TZ=Europe/Paris date +'%H:%M')_"
          else
            MSG="🎮 *RIVALS - Stats Live*\n\n👥 Joueurs : $PLAYING_F\n👁️ Visites : $VISITS_F\n⭐ Favoris : $FAVS_F\n\n_MAJ auto : $(TZ=Europe/Paris date +'%H:%M')_"
          fi

          curl -X POST "https://api.green-api.com/waInstance${{ secrets.GREEN_ID }}/sendMessage/${{ secrets.GREEN_TOKEN }}" \
          -H 'Content-Type: application/json' \
          -d "{\"chatId\": \"${{ secrets.GREEN_CHAT_ID }}\", \"message\": \"$MSG\"}"
