name: Update RIVALS Stats
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Get RIVALS Stats + DEBUG
        run: |
          set -e
          echo "=== TEST ID RIVALS 3623230945 ==="
          curl -s "https://games.roblox.com/v1/games?universeIds=3623230945" > data.json
          cat data.json
          echo ""
          echo "=== NOM DU JEU ==="
          jq -r '.data[0].name' data.json
          echo "=== JOUEURS ==="
          jq -r '.data[0].playing' data.json
          
          NAME=$(jq -r '.data[0].name' data.json)
          PLAYING=$(jq -r '.data[0].playing // 0' data.json)
          VISITS=$(jq -r '.data[0].visits // 0' data.json)
          FAVS=$(jq -r '.data[0].favoritedCount // 0' data.json)
          
          if [ "$NAME"!= "RIVALS" ]; then
            echo "ERREUR: Mauvais jeu détecté: $NAME"
            exit 1
          fi
          
          mkdir -p _site
          echo "<h1>$NAME</h1><h2>Joueurs: $PLAYING</h2><h2>Visites: $VISITS</h2><h2>Favoris: $FAVS</h2>" > _site/index.html
      
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v4
