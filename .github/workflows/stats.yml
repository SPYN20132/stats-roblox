name: Statistiques RIVALS + WhatsApp
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get Stats + Send WhatsApp
        shell: bash
        run: |
          UNIVERSE_ID="5199624968"

          # allorigins bypass le blocage Roblox
          URL="https://api.allorigins.win/raw?url=https://games.roblox.com/v1/games?universeIds=$UNIVERSE_ID"

          echo "Test via allorigins..."
          STATS=$(curl -s -L --max-time 15 "$URL")
          echo "Réponse: $STATS"

          PLAYING=$(echo $STATS | jq -r '.data[0].playing // 0')
          VISITS=$(echo $STATS | jq -r '.data[0].visits // 0')
          FAVS=$(echo $STATS | jq -r '.data[0].favoritedCount // 0')

          PLAYING_F=$(printf "%'d" $PLAYING)
          VISITS_F=$(printf "%'d" $VISITS)
          FAVS_F=$(printf "%'d" $FAVS)

          if [ "$PLAYING" = "0" ]; then
            MSG="❌ *RIVALS - API HS*\n\nMême allorigins est bloqué.\n\n_$(TZ=Europe/Paris date +'%H:%M')_"
          else
            MSG="🎮 *RIVALS - Stats Live*\n\n👥 Joueurs : $PLAYING_F\n👁️ Visites : $VISITS_F\n⭐ Favoris : $FAVS_F\n\n_MAJ auto : $(TZ=Europe/Paris date +'%H:%M')_"
          fi

          curl -X POST "https://api.green-api.com/waInstance${{ secrets.GREEN_ID }}/sendMessage/${{ secrets.GREEN_TOKEN }}" \
          -H 'Content-Type: application/json' \
          -d "{\"chatId\": \"${{ secrets.GREEN_CHAT_ID }}\", \"message\": \"$MSG\"}"
