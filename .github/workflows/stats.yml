name: Statistiques RIVALS + WhatsApp
on:
  schedule:
    - cron: '0 18 * * *' # 20h FR
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get Stats + Send WhatsApp
        run: |
          set -e
          WORKER_URL="https://rivals-api.liam-glondu.workers.dev"

          echo "Testing $WORKER_URL"
          STATS=$(curl -sL --max-time 10 --retry 3 "$WORKER_URL")

          echo "Réponse reçue:"
          echo "$STATS" | jq.

          PLAYING=$(echo "$STATS" | jq -r '.data[0].playing // 0')
          VISITS=$(echo "$STATS" | jq -r '.data[0].visits // 0')
          FAVS=$(echo "$STATS" | jq -r '.data[0].favoritedCount // 0')

          PLAYING_F=$(echo "$PLAYING" | sed ':a;s/\B[0-9]\{3\}\>/ &/;ta')
          VISITS_F=$(echo "$VISITS" | sed ':a;s/\B[0-9]\{3\}\>/ &/;ta')
          FAVS_F=$(echo "$FAVS" | sed ':a;s/\B[0-9]\{3\}\>/ &/;ta')

          if [ "$PLAYING" -eq 0 ]; then
            MSG="❌ *RIVALS - API Down*\n\nImpossible de récupérer les stats\n\n_Dernier check: $(TZ=Europe/Paris date +'%H:%M')_"
          else
            MSG="🎮 *RIVALS - Stats Live*\n\n👥 Joueurs : $PLAYING_F\n👁️ Visites : $VISITS_F\n⭐ Favoris : $FAVS_F\n\n_MAJ auto : $(TZ=Europe/Paris date +'%H:%M')_"
          fi

          curl -s -X POST "https://api.green-api.com/waInstance${{ secrets.GREEN_ID }}/sendMessage/${{ secrets.GREEN_TOKEN }}" \
          -H 'Content-Type: application/json' \
          -d "{\"chatId\": \"${{ secrets.GREEN_CHAT_ID }}\", \"message\": \"$MSG\"}"

          mkdir -p _site
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RIVALS Live</title>
          <style>body{font-family:system-ui;background:#0d1117;color:#fff;text-align:center;padding:50px;margin:0}h1{font-size:3em}h2{font-size:2.5em;margin:15px 0;color:#58a6ff}.stat{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:20px;margin:20px auto;max-width:500px}.update{color:#8b949e}#playing{color:#3fb950}</style></head>
          <body><h1>🎮 RIVALS</h1>
          <div class="stat"><h2 id="playing">👥 Joueurs :...</h2></div>
          <div class="stat"><h2 id="visits">👁️ Visites :...</h2></div>
          <div class="stat"><h2 id="favs">⭐ Favoris :...</h2></div>
          <p class="update">MAJ : <span id="time">...</span> | Refresh auto 30s</p>
          <script>
          async function go(){
            const r=await fetch("https://rivals-api.liam-glondu.workers.dev");
            const s=(await r.json()).data[0];
            playing.textContent=`👥 Joueurs : ${s.playing.toLocaleString('fr-FR')}`;
            visits.textContent=`👁️ Visites : ${s.visits.toLocaleString('fr-FR')}`;
            favs.textContent=`⭐ Favoris : ${s.favoritedCount.toLocaleString('fr-FR')}`;
            time.textContent=new Date().toLocaleTimeString("fr-FR");
          }
          go();setInterval(go,30000);
          </script></body></html>
          EOF

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/deploy-pages@v4
