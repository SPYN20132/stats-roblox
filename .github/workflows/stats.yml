name: Statistiques RIVALS + WhatsApp
on:
  schedule:
    - cron: '0 18 * * *' # 20h FR été
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get Stats + Send WhatsApp
        shell: bash
        run: |
          set -e
          WORKER_URL="https://rivals-api.ton-nom.workers.dev"
          UNIVERSE_ID="5199624968"

          echo "=== 1. Fetch depuis Cloudflare Worker ==="
          STATS=$(curl -s -L --max-time 15 --retry 2 --retry-delay 3 "$WORKER_URL" || echo '{}')
          echo "Réponse brute: $STATS"

          if! echo "$STATS" | jq -e '.data[0]' > /dev/null 2>&1; then
            echo "=== ERREUR: Worker HS ou JSON invalide ==="
            PLAYING=0; VISITS=0; FAVS=0
          else
            PLAYING=$(echo "$STATS" | jq -r '.data[0].playing // 0')
            VISITS=$(echo "$STATS" | jq -r '.data[0].visits // 0')
            FAVS=$(echo "$STATS" | jq -r '.data[0].favoritedCount // 0')
          fi

          LC_NUMERIC=fr_FR.UTF-8
          PLAYING_F=$(printf "%'d" "$PLAYING")
          VISITS_F=$(printf "%'d" "$VISITS")
          FAVS_F=$(printf "%'d" "$FAVS")

          if [ "$PLAYING" -eq 0 ]; then
            MSG="❌ *RIVALS - Erreur API*\n\nImpossible de récupérer les stats.\n\n_$(TZ=Europe/Paris date +'%H:%M')_"
          else
            MSG="🎮 *RIVALS - Stats Live*\n\n👥 Joueurs : $PLAYING_F\n👁️ Visites : $VISITS_F\n⭐ Favoris : $FAVS_F\n\n_MAJ auto : $(TZ=Europe/Paris date +'%H:%M')_"
          fi

          echo "=== 2. Envoi WhatsApp ==="
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "https://api.green-api.com/waInstance${{ secrets.GREEN_ID }}/sendMessage/${{ secrets.GREEN_TOKEN }}" \
          -H 'Content-Type: application/json' \
          -d "{\"chatId\": \"${{ secrets.GREEN_CHAT_ID }}\", \"message\": \"$MSG\"}")

          echo "HTTP_CODE WhatsApp: $HTTP_CODE"
          if [ "$HTTP_CODE"!= "200" ]; then
            echo "=== ERREUR WHATSAPP: Code $HTTP_CODE ==="
            exit 1
          fi

          echo "=== 3. Build page HTML ==="
          mkdir -p _site
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RIVALS Live</title>
          <style>body{font-family:system-ui;background:#0d1117;color:#fff;text-align:center;padding:50px;margin:0}h1{font-size:3em}h2{font-size:2.5em;margin:15px 0;color:#58a6ff}.stat{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:20px;margin:20px auto;max-width:500px}.update{color:#8b949e}#playing{color:#3fb950}</style></head>
          <body><h1>🎮 RIVALS</h1>
          <div class="stat"><h2 id="playing">👥 Joueurs :...</h2></div>
          <div class="stat"><h2 id="visits">👁️ Visites :...</h2></div>
          <div class="stat"><h2 id="favs">⭐ Favoris :...</h2></div>
          <p class="update">MAJ : <span id="time">...</span> | Refresh auto 30s</p>
          <script>
          const WORKER="https://rivals-api.ton-nom.workers.dev";
          async function go(){
            try{
              const r=await fetch(WORKER);
              const s=(await r.json()).data[0];
              playing.textContent=`👥 Joueurs : ${s.playing.toLocaleString()}`;
              visits.textContent=`👁️ Visites : ${s.visits.toLocaleString()}`;
              favs.textContent=`⭐ Favoris : ${s.favoritedCount.toLocaleString()}`;
              time.textContent=new Date().toLocaleTimeString("fr-FR");
            }catch(e){console.error(e)}
          }
          go();setInterval(go,30000);
          </script></body></html>
          EOF

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/deploy-pages@v4
